name: Daily Article Generator

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push new articles
        run: |
          git config user.name "Artrovex Bot"
          git config user.email "bot@artrovex.shop"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily articles: $(date +'%Y-%m-%d')"
          git push
